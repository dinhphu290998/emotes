# Flutter Android App.
name: emotes
description: Flutter Android App.
publish_to: 'none'

# App Version
version: 1.2.12+12

environment:
  sdk: ^3.6.1

# App dependencies
dependencies:
  flutter:
    sdk: flutter

  # Getx for state management
  get: ^4.7.2

  # Cupertino style icons
  cupertino_icons: ^1.0.8

  # For API Call
  http: ^1.3.0

  # Converting CSV data to List
  csv: ^6.0.0

  # For Lottie Animation
  lottie: ^3.3.1

  # For storing data (in local storage) 
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # For integrating ads
  google_mobile_ads: ^6.0.0

  # For firebase
  firebase_core: ^4.2.1

  # For Remote Config
  firebase_remote_config: ^6.1.2

  flutter_launcher_icons: ^0.14.4

  flutter_easyloading: ^3.0.5

  in_app_review: ^2.0.10
  url_launcher: ^6.3.0

  flutter_fortune_wheel: ^1.3.1

  shared_preferences: ^2.5.3

  awesome_snackbar_content: ^0.1.3

  dio: ^5.0.0

  google_fonts: ^6.3.0

  open_filex: ^4.4.0

  percent_indicator: ^4.2.5

  gallery_saver_plus: ^3.2.9

  facebook_app_events: ^0.27.1

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter_icons:
  android: true
  ios: true
  image_path: "assets/logo/logo.png"

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo/logo.png"

  flutter_launcher_icons: ^0.14.4

  # Change package name  
  # change_app_package_name: ^1.1.0

  # Encourages good practices
  flutter_lints: ^6.0.0

flutter:
  # Enabling material design
  uses-material-design: true

  # App assets
  assets:
    - assets/logo/logo.png
    - assets/language/vietnam.png
    - assets/language/usa.png
    - assets/background/start.png
    - assets/background/onboarding.png
    - assets/background/step1.png
    - assets/background/step2.png
    - assets/background/step3.png
    - assets/home/home1.png
    - assets/home/home2.png
    - assets/home/home3.png
    - assets/home/home4.png
    - assets/home/home5.png
    - assets/home/home6.png
    - assets/home/home7.png
    - assets/home/home8.png
    - assets/home/lucky1.png
    - assets/home/lucky2.png
    - assets/home/lucky3.png
    - assets/home/lucky4.png
    - assets/icon/diamond.png